version: "3"

tasks:
  start:
    desc: Start the infrastructure
    cmds:
      - docker compose up -d

  stop:
    desc: Stop the infrastructure
    cmds:
      - docker compose stop

  destroy:
    desc: Dispose the infrastructure (stop + remove)
    cmds:
      - docker compose down -v --remove-orphans

  status:
    desc: Show status
    cmds:
      - docker compose ps

  shell:
    desc: Open shell in node1
    cmds:
      - docker compose exec node1 bash

  graph:
    desc: Generate topology diagram (mermaid source)
    cmds:
      - docker compose config --format json | python ../tools/compose_to_mermaid.py > topology.mmd

  graph-render:
    desc: Render topology diagram to PNG (downloads mermaid-cli image on first run)
    cmds:
      - docker run --rm -v "{{.TASK_DIR}}":/data minlag/mermaid-cli -i /data/topology.mmd -o /data/images/demo-1-deployment.png
